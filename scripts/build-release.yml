name: Build Tradixa Link Bridge

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: TradixaLinkBridge.zip
            pyinstaller_name: TradixaLinkBridge.exe
          - os: macos-latest
            artifact_name: TradixaLinkBridge-macos.zip
            pyinstaller_name: TradixaLinkBridge

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial websockets pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name TradixaLinkBridge tradixa_bridge.py

      - name: Compress executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path dist/TradixaLinkBridge.exe -DestinationPath dist/TradixaLinkBridge.zip

      - name: Compress executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r TradixaLinkBridge-macos.zip TradixaLinkBridge

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
